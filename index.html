<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Saya</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; max-width: 400px; }
        h1 { color: #1a73e8; margin-bottom: 10px; }
        p { color: #5f6368; line-height: 1.6; }
        .btn { display: inline-block; margin-top: 20px; padding: 10px 20px; background-color: #1a73e8; color: white; text-decoration: none; border-radius: 5px; transition: 0.3s; }
        .btn:hover { background-color: #1557b0; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Halo, Selamat Datang!</h1>
        <p>Website ini dikembangkan menggunakan <strong>GitHub Codespaces</strong> sebagai bagian dari tugas pemrograman web.</p>
        <a href="#" class="btn">Pelajari Lebih Lanjut</a>
    </div>
</body>
</html>
